<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goomba Space</title>
    <style>
        /* Full-page styling */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #00aaff; /* Blue base */
            background-image: radial-gradient(white 5%, transparent 6%);
            background-size: 20px 20px; /* Size of dots */
            font-family: Arial, sans-serif;
        }

        /* Counter styling */
        #clickCounter {
            font-size: 1.5rem;
            color: white;
            background-color: rgba(0, 0, 0, 0.3); /* Slightly transparent */
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            user-select: none; /* Prevent text selection */
        }

        /* Button styling */
        .interactive-button {
            color: white;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            padding: 20px 40px;
            border: 2px solid white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none; /* Prevent text selection */
            background: none; /* transparent background */
        }

        /* Hover effect */
        .interactive-button:hover {
            background-color: white;
            color: #00aaff;
            transform: scale(1.1);
        }

        /* Active/click effect */
        .interactive-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <!-- Click counter -->
    <div id="clickCounter">Clicks: 0</div>

    <!-- Button -->
    <button class="interactive-button" onclick="handleClick()">
        goomba.space
    </button>

    <!-- Sound file -->
    <audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>

    <script>
        let clickCount = 0;

        function handleClick() {
            // Increment counter
            clickCount++;
            document.getElementById('clickCounter').textContent = `Clicks: ${clickCount}`;

            // Play sound
            const sound = document.getElementById('clickSound');
            sound.currentTime = 0; // rewind to start
            sound.play();
        }
    </script>
</body>
</html>
